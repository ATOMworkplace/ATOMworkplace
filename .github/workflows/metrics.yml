- name: GitHub Metrics
  uses: lowlighter/metrics@latest
  with:
    token: ${{ secrets.METRICS_TOKEN }}
    user: ATOMworkplace
    template: classic
    base: header, activity, community, repositories, metadata
    config_timezone: Asia/Kolkata
    config_twemoji: true
    config_animations: true
    
    # ✅ For Total Contributions (All-Time)
    plugin_isocalendar: yes
    plugin_isocalendar_duration: full-year  # Shows full year instead of partial
    
    # ✅ For All-Time Habits & Activity Patterns
    plugin_habits: yes
    plugin_habits_from: 2000-01-01
    plugin_habits_charts: yes
    plugin_habits_days: 365  # Analyze full year of data
    plugin_habits_facts: yes
    plugin_habits_trim: no   # Don't trim old data
    
    # ✅ For Total Lines of Code (All Repositories)
    plugin_lines: yes
    plugin_lines_history_limit: 0  # 0 = no limit, analyze all history
    plugin_lines_repositories_limit: 0  # Analyze all repositories
    plugin_lines_sections: repositories, history
    
    # ✅ For All-Time Language Stats
    plugin_languages: yes
    plugin_languages_ignored: html, css
    plugin_languages_limit: 0  # Show all languages
    plugin_languages_sections: most-used, recently-used
    plugin_languages_details: lines, bytes-size, percentage
    
    # ✅ For Total Stars & Repositories
    plugin_stars: yes
    plugin_stars_limit: 0  # Show all starred repos
    
    # ✅ For All Repositories Stats
    plugin_repositories: yes
    plugin_repositories_order: featured, pinned, starred, random
    
    # ✅ For All-Time Followup/PR Stats
    plugin_followup: yes
    plugin_followup_sections: repositories, user
    plugin_followup_indepth: yes
    
    # ✅ For Contributor Stats Across All Repos
    plugin_contributors: yes
    plugin_contributors_contributions: yes
    
    # ✅ Additional Plugin for Achievement Stats (Optional)
    plugin_achievements: yes
    plugin_achievements_display: detailed
    plugin_achievements_secrets: yes
    plugin_achievements_threshold: C
    
    # ✅ Calendar & Activity Details
    plugin_calendar: yes
    plugin_calendar_limit: 0  # Show all calendar activity
    
    # ✅ Code Frequency & Commit Patterns
    plugin_activity: yes
    plugin_activity_limit: 0  # Unlimited activity tracking
    plugin_activity_days: 0   # All days
    plugin_activity_filter: all
    plugin_activity_visibility: all
    
    # ✅ Popular Repositories with Detailed Stats
    plugin_notable: yes
    plugin_notable_from: organization, user
    plugin_notable_repositories: yes
    plugin_notable_indepth: yes
    
    # ✅ Traffic & Repository Analytics
    plugin_traffic: yes
    
    # ✅ Gists Statistics
    plugin_gists: yes
    
    # ✅ Stargazers & Watchers Analytics  
    plugin_stargazers: yes
    plugin_stargazers_charts: yes
    plugin_stargazers_charts_type: graph
    
    # ✅ People & Social Network
    plugin_people: yes
    plugin_people_limit: 0
    plugin_people_types: followers, following
    plugin_people_identicons: yes
    plugin_people_size: 28
    
    # ✅ Reactions & Interactions
    plugin_reactions: yes
    plugin_reactions_limit: 0
    plugin_reactions_details: count, percentage
    
    # ✅ Discussions Participation
    plugin_discussions: yes
    plugin_discussions_categories: yes
    
    # ✅ Topics & Technologies Used
    plugin_topics: yes
    plugin_topics_limit: 0
    plugin_topics_mode: icons
    
    # ✅ Fortune & Personal Touch
    plugin_fortune: yes
    
    # ✅ Stackoverflow Integration (if applicable)
    plugin_stackoverflow: yes
    plugin_stackoverflow_user: 0  # Replace with your SO user ID if you have one
    plugin_stackoverflow_sections: answers-top, questions-recent
    plugin_stackoverflow_limit: 2
